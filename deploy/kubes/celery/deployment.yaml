apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery
  namespace: hiver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      containers:
        - name: celery
          image: your-registry/hiver-django:latest
          command:
            ["uv", "run", "celery", "-A", "config", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: django-config
            - secretKeyRef:
                name: django-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
