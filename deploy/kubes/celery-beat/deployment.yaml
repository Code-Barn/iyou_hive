apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: hiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: your-registry/hiver-django:latest
          command:
            ["uv", "run", "celery", "-A", "config", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: django-config
            - secretKeyRef:
                name: django-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
