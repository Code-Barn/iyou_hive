version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: apps/core/Dockerfile
    command: uv run gunicorn --bind 0.0.0.0:8000 config.wsgi:application --workers 4 --threads 2
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=False
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:6
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: apps/core/Dockerfile
    command: uv run celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=False
      - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
    depends_on:
      - db
      - redis
      - web
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: apps/core/Dockerfile
    command: uv run celery -A config beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=False
      - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
    depends_on:
      - db
      - redis
      - web
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
  postgres_data:
