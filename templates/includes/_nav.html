<nav class="mesh-nav" style="height:36px;display:flex;align-items:center;justify-content:space-between;background-color:#ffffff;border-bottom:1px solid #e5e7eb;padding:0 1rem;">
    <div class="mesh-nav-inner">
        <span class="mesh-nav-brand">Hiver</span>
        <div class="mesh-nav-links">
            <a href="{{ POLY_URL }}" class="mesh-nav-link">Poly</a>
            <a href="{{ SOCIALFEED_URL }}" class="mesh-nav-link">Social Feed</a>
            <span id="meshBadge" class="mesh-badge hidden">Sovereign Mesh Active</span>
            {% if user.is_authenticated %}
                <span class="mesh-user" title="{{ user.username }}">
                    {% if "did:" in user.username %}{{ user.username|truncatechars:24 }}{% else %}{{ user.username }}{% endif %}
                </span>
                <form action="{% url 'accounts:logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-sm font-mono text-gray-500 hover:text-gray-900 focus:outline-none">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'oidc_authentication_init' %}" class="mesh-login-link">Login</a>
            {% endif %}
        </div>
    </div>
</nav>

<script>
document.addEventListener("DOMContentLoaded", function () {
    var badge = document.getElementById("meshBadge");
    if (!badge) return;
    var vaultUrl = "{{ VAULT_URL }}".replace(/^ws:/, "http:").replace(/^wss:/, "https:");
    fetch(vaultUrl + "/", { signal: AbortSignal.timeout(300) })
        .then(function (r) { if (r.ok) badge.classList.remove("hidden"); })
        .catch(function () {});
});
</script>
