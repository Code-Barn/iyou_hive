<nav class="bg-white shadow-sm border-b dark:bg-gray-800">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <span class="font-bold text-lg text-indigo-600 dark:text-indigo-400">Hiver</span>
    <div class="flex items-center gap-4">
      <a href="{% url 'core:case_list' %}" class="text-sm text-gray-600 hover:text-indigo-600 dark:text-gray-300 dark:hover:text-indigo-400">Cases</a>
      {% if user.is_authenticated %}
        <a href="#" onclick="togglePane('timeline-pane'); return false;" class="text-sm text-gray-600 hover:text-indigo-600 dark:text-gray-300 dark:hover:text-indigo-400">Timeline</a>
        <a href="#" onclick="togglePane('archive-pane'); return false;" class="text-sm text-gray-600 hover:text-indigo-600 dark:text-gray-300 dark:hover:text-indigo-400">Archive</a>
        <a href="#" onclick="togglePane('ai-pane'); return false;" class="text-sm text-gray-600 hover:text-indigo-600 dark:text-gray-300 dark:hover:text-indigo-400">AI</a>
        <span class="text-xs bg-orange-100 text-orange-800 px-2 py-0.5 rounded-full font-medium dark:bg-orange-900 dark:text-orange-200" title="{{ user.username }}">
          {% if "did:" in user.username %}{{ user.username|truncatechars:24 }}{% else %}{{ user.username }}{% endif %}
        </span>
      {% endif %}
      {% if user.is_authenticated %}
        <form action="{% url 'accounts:logout' %}" method="post" class="inline">
          {% csrf_token %}
          <button type="submit" class="text-sm text-red-500 hover:text-red-700 bg-transparent border-none cursor-pointer dark:text-red-400 dark:hover:text-red-300">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'oidc_authentication_init' %}" class="text-sm text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300">Login</a>
      {% endif %}
    </div>
  </div>
</nav>
