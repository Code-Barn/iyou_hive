<div class="modal-overlay" id="createHiveModalOverlay">
    <div class="modal-content">
        <h2>Welcome to Hiver!</h2>
        <p>To get started, name your first Hive:</p>
        <form id="createHiveForm" method="post" action="{% url 'core:create_case' %}">
            {% csrf_token %}
            <input type="text" id="hiveName" name="name" placeholder="Enter Hive name" required autofocus>
            <button type="submit" class="btn btn-primary">Create Hive</button>
        </form>
    </div>
</div>

<style>
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000;
    }
    
    .modal-overlay .modal-content {
        background-color: var(--bg-card, #1a1a1a);
        padding: 2.5rem;
        border-radius: 12px;
        max-width: 450px;
        width: 90%;
        color: var(--text, #ffffff);
        border: 2px solid #FF8C00;
        box-shadow: 0 0 30px rgba(255, 140, 0, 0.3);
        text-align: center;
    }
    
    .modal-overlay h2 {
        color: #FF8C00;
        margin-bottom: 0.5rem;
        font-size: 1.75rem;
    }
    
    .modal-overlay p {
        color: var(--text-secondary, #cccccc);
        margin-bottom: 1.5rem;
    }
    
    .modal-overlay input[type="text"] {
        width: 100%;
        padding: 0.875rem 1rem;
        margin-bottom: 1.25rem;
        border: 2px solid #404040;
        border-radius: 8px;
        background-color: var(--bg, #121212);
        color: var(--text, #ffffff);
        font-size: 1.1rem;
        transition: border-color 0.2s;
    }
    
    .modal-overlay input[type="text"]:focus {
        outline: none;
        border-color: #FF8C00;
    }
    
    .modal-overlay .btn {
        width: 100%;
        padding: 0.875rem;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
    }
    
    .modal-overlay .btn-primary {
        background-color: #FF8C00;
        color: #000;
        border: none;
    }
    
    .modal-overlay .btn-primary:hover {
        background-color: #e67e00;
    }

    [data-theme="light"] .modal-overlay {
        background-color: rgba(255, 255, 255, 0.9);
    }
    
    [data-theme="light"] .modal-overlay .modal-content {
        background-color: #ffffff;
        color: #333333;
        border-color: #FF8C00;
    }
    
    [data-theme="light"] .modal-overlay h2 {
        color: #FF8C00;
    }
    
    [data-theme="light"] .modal-overlay p {
        color: #666666;
    }
    
    [data-theme="light"] .modal-overlay input[type="text"] {
        background-color: #f5f5f5;
        border-color: #cccccc;
        color: #333333;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var modal = document.getElementById('createHiveModalOverlay');
    var form = document.getElementById('createHiveForm');
    var input = document.getElementById('hiveName');
    
    if (modal && input && form) {
        input.focus();
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            var formData = new FormData(form);
            var csrfToken = form.querySelector('[name="csrfmiddlewaretoken"]').value;
            
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': csrfToken
                }
            })
            .then(function(response) {
                if (response.redirected) {
                    window.location.href = response.url;
                } else if (response.ok) {
                    return response.text();
                }
                throw new Error('Network response was not ok');
            })
            .then(function(text) {
                if (text && text.includes('core/case_list')) {
                    window.location.href = '/core/cases/';
                }
            })
            .catch(function(error) {
                console.error('Error:', error);
                form.submit();
            });
        });
    }
});
</script>
