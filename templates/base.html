{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hiver{% endblock %}</title>
    {% if DEBUG %}
    <!-- Development: Use unminified files for easier debugging -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% else %}
    <!-- Production: Use minified files -->
    <link rel="stylesheet" href="{% static 'css/style.min.css' %}">
    {% endif %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo-link">
            <img id="site-logo" src="{% static 'core/images/logos/light_mode_LOGO.png' %}" alt="Hiver" width="150">
        </a>
        <div class="nav-links">
            <a href="{% url 'timeline:timeline' %}" class="nav-button">Timeline</a>
            <a href="{% url 'archive:archive' %}" class="nav-button">Archive</a>
            {% if user.is_authenticated %}
            <a href="{% url 'ai_assistant:chat' %}" class="nav-button">AI Assistant</a>
            <a href="{% url 'admin:logout' %}" class="nav-button">Logout</a>
            {% else %}
            <a href="{% url 'admin:login' %}" class="nav-button">Login</a>
            {% endif %}
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode">
            <span class="theme-icon">☀️</span>
        </button>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% if DEBUG %}
    <!-- Development: Use unminified files -->
    <script src="{% static 'js/theme.js' %}"></script>
    {% else %}
    <!-- Production: Use minified files -->
    <script src="{% static 'js/theme.min.js' %}"></script>
    {% endif %}
    {% block extra_js %}{% endblock %}
</body>
</html>
