{% load static %}
{% load assets %}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iyou_hiver // Sovereign Archive Vault</title>
    {% render_vite_assets %}
    <style>
    #sovereign-ecosystem-topbar + header + #timeline-app { margin-top: 0; }
    </style>
</head>
<body class="h-full text-gray-900 font-sans antialiased">

    <div id="timeline-app"
         data-username="{{ username }}"
         data-case-id="{{ active_case_id|default:'' }}"
         data-poly-url="{{ POLY_URL }}"
         data-socialfeed-url="{{ SOCIALFEED_URL }}"
         data-vault-url="{{ VAULT_URL }}"
         class="min-h-screen">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="h-8 w-8 animate-spin rounded-full border-4 border-indigo-600 border-t-transparent mx-auto"></div>
                <p class="mt-4 text-sm text-gray-500 font-mono">Initializing Hiver Secure Context...</p>
            </div>
        </div>
    </div>



</body>
</html>
