<div class="ai-pane">
    {% load static %}
    <div class="ai-header">
        <h1>AI Research Assistant</h1>
        <button id="ai-settings-toggle" class="icon-button" title="AI Settings">⚙️</button>
    </div>

    <div id="ai-settings-panel" class="api-key-prompt" {% if api_configured %}style="display: none;"{% endif %}>
        <p>Configure your AI Assistant settings:</p>
        <form id="api-key-form" class="api-key-form">
            <div class="form-group">
                <label for="preferred-provider">Preferred Provider:</label>
                <select id="preferred-provider" class="form-control">
                    <option value="mistral" {% if not ai_settings or ai_settings.preferred_ai_provider == 'mistral' %}selected{% endif %}>Mistral AI</option>
                    <option value="gemini" {% if ai_settings and ai_settings.preferred_ai_provider == 'gemini' %}selected{% endif %}>Google Gemini</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mistral-key-input">Mistral API Key:</label>
                <input type="password" id="mistral-key-input" placeholder="Enter Mistral API Key" value="{{ ai_settings.mistral_api_key|default:'' }}">
                <p class="help-text">Get a free API key at <a href="https://mistral.ai" target="_blank">mistral.ai</a></p>
            </div>
            <div class="form-group">
                <label for="gemini-key-input">Gemini API Key:</label>
                <input type="password" id="gemini-key-input" placeholder="Enter Gemini API Key" value="{{ ai_settings.gemini_api_key|default:'' }}">
                <p class="help-text">Get a free API key at <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a></p>
            </div>
            <button type="submit" class="btn-primary">Save Settings</button>
        </form>
    </div>

    <div class="chat-interface">
        <div class="chat-history" id="chat-history">
            <div class="message assistant">Hello! How can I help with your legal research today?</div>
        </div>

        <form id="chat-form" class="chat-input">
            <input type="text" id="user-input" placeholder="Ask a question..." {% if not api_configured %}disabled{% endif %}>
            <button type="submit" {% if not api_configured %}disabled{% endif %}>Send</button>
        </form>
    </div>
</div>

<!-- Load AI Assistant JavaScript -->
<script src="{% static 'js/ai_assistant.js' %}"></script>

<style>
.ai-pane {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 0.5rem;
    overflow: hidden;
}

.ai-pane .ai-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 0.5rem;
}

.ai-pane .ai-header h1 {
    font-size: 1.1rem;
    color: var(--primary);
    margin: 0;
}

.icon-button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    padding: 0.2rem;
}

.api-key-prompt {
    padding: 0.75rem;
    background: rgba(255, 140, 0, 0.1);
    border: 1px solid var(--primary);
    border-radius: 6px;
    margin-bottom: 0.5rem;
}

.api-key-prompt p {
    margin: 0 0 0.5rem 0;
    font-size: 0.85rem;
}

.api-key-form {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}

.form-group label {
    font-size: 0.8rem;
    font-weight: 600;
}

.form-control, .api-key-form input {
    padding: 0.375rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.85rem;
}

.btn-primary {
    padding: 0.375rem 0.75rem;
    background: var(--primary);
    border: none;
    border-radius: 4px;
    color: #000;
    cursor: pointer;
    font-weight: 600;
    align-self: flex-start;
}

.help-text {
    font-size: 0.75rem !important;
    color: var(--text-secondary);
    margin-top: 0.25rem !important;
}

.help-text a {
    color: var(--primary);
}

.chat-interface {
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 0.5rem;
    min-height: 0;
}

.chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
    background: var(--bg-card);
    border-radius: 6px;
    min-height: 60px;
}

.message {
    padding: 0.5rem 0.75rem;
    margin-bottom: 0.5rem;
    border-radius: 8px;
    max-width: 85%;
}

.message.assistant {
    background: var(--bg-alt);
    color: var(--text);
}

.chat-input {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
}

.chat-input input {
    flex: 1;
    padding: 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
}

.chat-input button {
    padding: 0.5rem 1rem;
    background: var(--primary);
    border: none;
    border-radius: 4px;
    color: #000;
    cursor: pointer;
    font-weight: 600;
}

.chat-input button:disabled {
    background: var(--border);
    cursor: not-allowed;
}
</style>
