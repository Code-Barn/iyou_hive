<div class="ai-pane">
    <div class="ai-header">
        <h1>AI Research Assistant</h1>
    </div>

    {% if not api_configured %}
    <div class="api-key-prompt">
        <p>Set your Mistral API key to use AI assistant:</p>
        <form id="api-key-form" class="api-key-form">
            <input type="password" id="api-key-input" placeholder="Enter MISTRAL_API_KEY">
            <button type="submit">Save</button>
        </form>
        <p class="help-text">Get a free API key at <a href="https://mistral.ai" target="_blank">mistral.ai</a></p>
    </div>
    {% endif %}

    <div class="chat-interface">
        <div class="chat-history" id="chat-history">
            <div class="message assistant">Hello! How can I help with your legal research today?</div>
        </div>

        <form id="chat-form" class="chat-input">
            <input type="text" id="user-input" placeholder="Ask a question..." {% if not api_configured %}disabled{% endif %}>
            <button type="submit" {% if not api_configured %}disabled{% endif %}>Send</button>
        </form>
    </div>
</div>

<style>
.ai-pane {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 0.5rem;
    overflow: hidden;
}

.ai-pane .ai-header {
    padding-bottom: 0.5rem;
}

.ai-pane .ai-header h1 {
    font-size: 1.1rem;
    color: var(--primary);
    margin: 0;
}

.api-key-prompt {
    padding: 0.75rem;
    background: rgba(255, 140, 0, 0.1);
    border: 1px solid var(--primary);
    border-radius: 6px;
    margin-bottom: 0.5rem;
}

.api-key-prompt p {
    margin: 0 0 0.5rem 0;
    font-size: 0.85rem;
}

.api-key-form {
    display: flex;
    gap: 0.5rem;
}

.api-key-form input {
    flex: 1;
    padding: 0.375rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.85rem;
}

.api-key-form button {
    padding: 0.375rem 0.75rem;
    background: var(--primary);
    border: none;
    border-radius: 4px;
    color: #000;
    cursor: pointer;
    font-weight: 600;
}

.help-text {
    font-size: 0.75rem !important;
    color: var(--text-secondary);
}

.help-text a {
    color: var(--primary);
}

.chat-interface {
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 0.5rem;
    min-height: 0;
}

.chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
    background: var(--bg-card);
    border-radius: 6px;
    min-height: 60px;
}

.message {
    padding: 0.5rem 0.75rem;
    margin-bottom: 0.5rem;
    border-radius: 8px;
    max-width: 85%;
}

.message.assistant {
    background: var(--bg-alt);
    color: var(--text);
}

.chat-input {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
}

.chat-input input {
    flex: 1;
    padding: 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
}

.chat-input button {
    padding: 0.5rem 1rem;
    background: var(--primary);
    border: none;
    border-radius: 4px;
    color: #000;
    cursor: pointer;
    font-weight: 600;
}

.chat-input button:disabled {
    background: var(--border);
    cursor: not-allowed;
}
</style>
