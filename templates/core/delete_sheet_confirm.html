{% extends 'base.html' %}

{% block title %}Delete Response Sheet - Hiver{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; font-family: sans-serif; text-align: center;">
    <h1>Delete Response Sheet?</h1>
    <p>Are you sure you want to delete <strong>{{ sheet.title }}</strong>?</p>
    <p style="color: #666;">This action cannot be undone.</p>
    
    <form method="POST" style="margin-top: 20px;">
        {% csrf_token %}
        <button type="submit" style="padding: 10px 20px; background: #d32f2f; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Yes, Delete
        </button>
        <a href="{% url 'core:response_sheet_review' sheet.id %}" style="margin-left: 10px; color: #666;">Cancel</a>
    </form>
</div>
{% endblock %}
