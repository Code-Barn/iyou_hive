{% extends 'base.html' %}

{% block title %}Generate Response Sheet - Hiver{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 40px auto; font-family: sans-serif;">
    <h1>Generate New Response Sheet</h1>
    <p style="color: #666;">Upload a legal motion PDF to extract claims for review.</p>
    
    <form method="POST" enctype="multipart/form-data" style="margin-top: 20px;">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">PDF File:</label>
            <input type="file" name="pdf_file" accept=".pdf" required
                   style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100%;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">State Code:</label>
            <select name="state_code" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100%;">
                <option value="IL" selected>Illinois (IL)</option>
                <option value="CA">California (CA)</option>
                <option value="DEFAULT">Other/Universal</option>
            </select>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Link to Case (Optional):</label>
            <select name="case_id" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100%;">
                <option value="">-- No Case --</option>
                {% for case in cases %}
                <option value="{{ case.id }}">{{ case.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit" style="padding: 10px 20px; background: #0064AA; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Generate Response Sheet
        </button>
        <a href="{% url 'core:response_sheet_list' %}" style="margin-left: 10px; color: #666;">Cancel</a>
    </form>
</div>
{% endblock %}
