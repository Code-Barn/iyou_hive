<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant JavaScript Test</title>
    <script src="/static/js/ai_assistant.js"></script>
</head>
<body>
    <h1>AI Assistant JavaScript Test</h1>
    
    <div class="api-key-prompt">
        <p>Test API key form:</p>
        <form id="api-key-form" class="api-key-form">
            <input type="password" id="api-key-input" placeholder="Enter MISTRAL_API_KEY" value="test_key_12345">
            <button type="submit">Save</button>
        </form>
    </div>
    
    <div id="result"></div>
    
    <script>
        // Test that the function is defined
        if (typeof handleApiKeySubmit === 'function') {
            document.getElementById('result').innerHTML = '<p style="color: green;">✅ JavaScript loaded successfully!</p>';
            console.log('AI Assistant JavaScript is ready');
        } else {
            document.getElementById('result').innerHTML = '<p style="color: red;">❌ JavaScript function not found!</p>';
            console.error('AI Assistant JavaScript function not found');
        }
    </script>
</body>
</html>
